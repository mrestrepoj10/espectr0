name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: CI only needs to read the repo.
permissions:
  contents: read

# One run per branch/PR; superseded runs on PRs are cancelled, main always finishes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref_name != 'main' }}

env:
  NEXT_TELEMETRY_DISABLED: 1

jobs:
  ci:
    name: Lint, typecheck, test & build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Verify NSR-10 evidence integrity
        run: pnpm evidence:check

      # `pnpm build` also runs eslint (see package.json); lint already ran above,
      # so invoke next directly to avoid doing it twice.
      - name: Build
        run: pnpm exec next build

      - name: Verify navigation verifier failures
        run: node scripts/check-navigation-verifier-failures.mjs

      - name: Verify navigation routes
        run: node scripts/verify-navigation-routes.mjs
